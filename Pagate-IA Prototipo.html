<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Págate-IA · Prototipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; font-family: 'Manrope', -apple-system, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.3); border-radius: 3px; }
  input::placeholder { color: #64748B; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="frames/design-canvas.jsx"></script>
<script type="text/babel" src="components/tokens.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/phone-shell.jsx"></script>
<script type="text/babel" src="components/screen-welcome.jsx"></script>
<script type="text/babel" src="components/screen-home.jsx"></script>
<script type="text/babel" src="components/screen-finanzas.jsx"></script>
<script type="text/babel" src="components/screen-inventario.jsx"></script>
<script type="text/babel" src="components/screen-ia.jsx"></script>
<script type="text/babel" src="components/screen-perfil.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <div style={{ padding: '40px 60px 20px' }}>
        <div style={{ fontSize: 32, fontWeight: 800, color: '#1A1510', letterSpacing: -0.5 }}>
          Págate-IA
        </div>
        <div style={{ fontSize: 15, color: 'rgba(60,50,40,0.65)', marginTop: 4 }}>
          Asistente financiero para artesanos y creadores · Importado desde FrancoGalaz/appprecios
        </div>
      </div>

      <DCSection title="1 · Onboarding" subtitle="Pantalla de bienvenida con tema claro">
        <DCArtboard label="Welcome"><WelcomeScreen/></DCArtboard>
      </DCSection>

      <DCSection title="2 · Dashboard (5 tabs)" subtitle="Tema oscuro · Bottom nav compartido · Los tabs son interactivos">
        <DCArtboard label="Inicio"><HomeScreen/></DCArtboard>
        <DCArtboard label="Finanzas"><FinanzasScreen/></DCArtboard>
        <DCArtboard label="Inventario"><InventarioScreen/></DCArtboard>
        <DCArtboard label="IA"><IaScreen/></DCArtboard>
        <DCArtboard label="Perfil"><PerfilScreen/></DCArtboard>
      </DCSection>

      <DCPostIt top={180} left={480} rotate={-3} width={200}>
        Pan con trackpad/mouse.<br/>Pinch o scroll+ctrl para zoom.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
