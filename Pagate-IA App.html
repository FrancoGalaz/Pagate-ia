<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Págate-IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; font-family:'Manrope', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  input, textarea, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .app-bg-dark { background: #0B0D14; }
  .app-bg-light { background: #F6F8F7; }
  .fade-in { animation: fade .25s ease; }
  @keyframes fade { from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
// ─── Tokens ───────────────────────────────────────────────────────
const makeTheme = (dark) => ({
  dark,
  bg:        dark ? '#0B0D14' : '#F6F8F7',
  surface:   dark ? '#141720' : '#FFFFFF',
  surface2:  dark ? '#1C2030' : '#F8FAFC',
  border:    dark ? '#252D42' : '#E2E8F0',
  textP:     dark ? '#F1F5F9' : '#0F172A',
  textS:     dark ? '#94A3B8' : '#475569',
  textT:     dark ? '#64748B' : '#94A3B8',
  brand:     '#00C2B8',
  brandDark: '#00A89F',
  accent:    '#F97316',
  success:   '#10B981',
  warning:   '#F59E0B',
  error:     '#EF4444',
  info:      '#3B82F6',
  brandGrad: 'linear-gradient(135deg,#00C2B8 0%,#00A89F 100%)',
  shBrand:   '0 6px 16px rgba(0,194,184,0.25)',
  shBrandX:  '0 8px 24px rgba(0,194,184,0.40)',
  font: "'Manrope', -apple-system, system-ui, sans-serif",
});

// ─── Unified icon set (stroke-based, same visual family everywhere) ───
const Ic = ({ name, size=22, color='currentColor', filled=false, sw=1.8 }) => {
  const p = { size, color, filled, sw };
  const map = {
    home:       <path d="M3 11l9-8 9 8v10a2 2 0 01-2 2h-4v-7H9v7H5a2 2 0 01-2-2V11z"/>,
    chart:      <g><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="6" width="4" height="15" rx="1"/><rect x="17" y="9" width="4" height="12" rx="1"/></g>,
    inventory:  <g><path d="M3 7l9-4 9 4v10l-9 4-9-4V7z"/><path d="M3 7l9 4 9-4M12 11v10"/></g>,
    bot:        <g><rect x="4" y="7" width="16" height="12" rx="3"/><path d="M12 3v4M8 19v2M16 19v2"/><circle cx="9" cy="13" r="1.2" fill={color} stroke="none"/><circle cx="15" cy="13" r="1.2" fill={color} stroke="none"/></g>,
    user:       <g><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></g>,
    bell:       <path d="M6 8a6 6 0 1112 0c0 7 3 9 3 9H3s3-2 3-9zM10 21a2 2 0 004 0"/>,
    up:         <path d="M12 19V5M5 12l7-7 7 7"/>,
    down:       <path d="M12 5v14M5 12l7 7 7-7"/>,
    plus:       <path d="M12 5v14M5 12h14"/>,
    minus:      <path d="M5 12h14"/>,
    search:     <g><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></g>,
    send:       <path d="M4 12l16-8-6 18-3-8-7-2z"/>,
    wallet:     <g><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18M17 15h2"/></g>,
    receipt:    <path d="M6 2h12v20l-3-2-3 2-3-2-3 2V2zM9 7h6M9 11h6M9 15h4"/>,
    trending:   <path d="M3 17l6-6 4 4 8-8M15 7h6v6"/>,
    settings:   <g><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8 1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></g>,
    help:       <g><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 015.8 1c0 2-3 3-3 3M12 17h.01"/></g>,
    star:       <path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8L2 9.3l6.9-1L12 2z"/>,
    share:      <g><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></g>,
    logout:     <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>,
    chevron:    <path d="M9 6l6 6-6 6"/>,
    close:      <path d="M18 6L6 18M6 6l12 12"/>,
    sun:        <g><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></g>,
    moon:       <path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>,
    coin:       <g><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 10h4.5a2 2 0 010 4H9"/></g>,
    handyman:   <path d="M6 20l5-5M11 15l-2-2 6-6 2 2M14 6l4 4M9 8l2 2M16 3l5 5"/>,
    whatsapp:   <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 014 11.5a8.5 8.5 0 018.5-8.5 8.5 8.5 0 018.5 8.5z"/>,
    email:      <g><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 5l10 7 10-7"/></g>,
    sms:        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"/>,
    copy:       <g><rect x="9" y="9" width="10" height="10" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></g>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24"
      fill={filled ? color : 'none'}
      stroke={filled ? 'none' : color}
      strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
      {map[name]}
    </svg>
  );
};

// ─── Phone shell chrome ───────────────────────────────────────────
const StatusBar = ({ t }) => {
  const c = t.dark ? '#fff' : '#000';
  return (
    <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:40,
      display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'18px 32px 0', height:54, fontFamily:'-apple-system,system-ui' }}>
      <span style={{ fontWeight:600, fontSize:17, color:c }}>9:41</span>
      <div style={{ display:'flex', gap:6, alignItems:'center' }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx=".7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx=".7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx=".7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx=".7" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x=".5" y=".5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity=".35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
        </svg>
      </div>
    </div>
  );
};

const BottomNav = ({ t, active, setActive }) => {
  const items = [
    { k:'home',    ic:'home',      l:'Inicio' },
    { k:'finance', ic:'chart',     l:'Finanzas' },
    { k:'inv',     ic:'inventory', l:'Inventario' },
    { k:'ia',      ic:'bot',       l:'IA' },
    { k:'profile', ic:'user',      l:'Perfil' },
  ];
  return (
    <div style={{ position:'absolute', left:0, right:0, bottom:0, zIndex:30,
      background:t.surface, borderTop:`1px solid ${t.border}`, paddingBottom:'env(safe-area-inset-bottom, 0px)' }}>
      <div style={{ display:'flex', height:64 }}>
        {items.map(it => {
          const on = it.k === active;
          return (
            <div key={it.k} onClick={() => setActive(it.k)} style={{
              flex:1, display:'flex', flexDirection:'column', alignItems:'center',
              justifyContent:'center', gap:3, cursor:'pointer',
            }}>
              <Ic name={it.ic} size={24} color={on ? t.brand : t.textS} sw={on ? 2.2 : 1.8} />
              <div style={{ fontSize:10, fontWeight:on?700:500, color:on ? t.brand : t.textS, letterSpacing:.2 }}>{it.l}</div>
            </div>
          );
        })}
      </div>
      <div style={{ height:12 }}/>
    </div>
  );
};

const TopHeader = ({ t, title, subtitle, right }) => (
  <div style={{ padding:'22px 24px 0', display:'flex', alignItems:'flex-end', gap:12 }}>
    <div style={{ flex:1 }}>
      <div style={{ fontSize:24, fontWeight:800, color:t.textP, letterSpacing:-.3 }}>{title}</div>
      {subtitle && <div style={{ fontSize:13, color:t.textS, marginTop:2 }}>{subtitle}</div>}
    </div>
    {right}
  </div>
);

// ─── Theme toggle pill (iconographic, consistent) ────────────────
const ThemeToggle = ({ t, onToggle }) => (
  <div onClick={onToggle} role="button" aria-label="Cambiar tema" style={{
    width:40, height:40, borderRadius:'50%',
    background:t.surface, border:`1px solid ${t.border}`,
    display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer',
    transition:'all .25s',
  }}>
    <Ic name={t.dark ? 'sun' : 'moon'} size={20} color={t.textP} />
  </div>
);

// ─── Screen: Home ─────────────────────────────────────────────────
const fmtK = v => v >= 1000 ? `${(v/1000).toFixed(1)}K` : `${Math.round(v)}`;

const HomeScreen = ({ t, state, go }) => {
  const income = state.tx.filter(x => x.type==='income').reduce((s,x)=>s+x.amount, 0);
  const expenses = state.tx.filter(x => x.type==='expense').reduce((s,x)=>s+x.amount, 0);
  const balance = income - expenses;
  const progress = Math.min(1, income / state.profile.goal);
  const recent = state.tx.slice(-5).reverse();

  return (
    <div className="fade-in" style={{ padding:'0 20px 16px' }}>
      <TopHeader t={t}
        title={`Hola, ${state.profile.name.split(' ')[0]} 👋`}
        subtitle={state.profile.businessName}
        right={
          <div onClick={()=>go.openSheet('notifications')} style={{ position:'relative', width:40, height:40, borderRadius:'50%',
            background:t.surface, border:`1px solid ${t.border}`,
            display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
            <Ic name="bell" size={20} color={t.textP} />
            <div style={{ position:'absolute', top:8, right:8, width:8, height:8, borderRadius:'50%', background:t.error }}/>
          </div>
        }
      />

      {/* Balance card */}
      <div style={{ margin:'18px 4px 0', padding:22, borderRadius:28,
        background:t.brandGrad, boxShadow:t.shBrandX, color:'#fff' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ fontSize:11, fontWeight:700, color:'rgba(255,255,255,.82)', letterSpacing:.6 }}>BALANCE DEL MES</div>
          <div style={{ padding:'3px 12px', borderRadius:100, background:'rgba(255,255,255,.2)',
            fontSize:11, fontWeight:600 }}>Marzo 2025</div>
        </div>
        <div style={{ fontSize:38, fontWeight:800, letterSpacing:-1, marginTop:6 }}>${fmtK(balance)}</div>
        <div style={{ display:'flex', gap:22, marginTop:14 }}>
          <HeroStat ic="up" label="Ingresos" amount={income}/>
          <HeroStat ic="down" label="Gastos" amount={expenses}/>
        </div>
        <div style={{ marginTop:14, height:6, borderRadius:100, background:'rgba(255,255,255,.25)', overflow:'hidden' }}>
          <div style={{ width:`${progress*100}%`, height:'100%', background:'#fff', transition:'width .4s' }}/>
        </div>
        <div style={{ marginTop:6, fontSize:11, color:'rgba(255,255,255,.82)' }}>
          Meta: ${fmtK(state.profile.goal)} · {Math.round(progress*100)}% completado
        </div>
      </div>

      {/* Quick actions */}
      <div style={{ marginTop:22, padding:'0 4px' }}>
        <div style={{ fontSize:15, fontWeight:700, color:t.textP }}>Acciones Rápidas</div>
        <div style={{ display:'flex', marginTop:12, gap:4 }}>
          <Action t={t} ic="plus"  label="Venta"      color={t.brand}  onClick={()=>go.openAdd('income')} />
          <Action t={t} ic="minus" label="Gasto"      color={t.error}  onClick={()=>go.openAdd('expense')} />
          <Action t={t} ic="inventory" label="Inventario" color={t.info} onClick={()=>go.tab('inv')} />
          <Action t={t} ic="bot"   label="Preguntar IA" color={t.accent} onClick={()=>go.tab('ia')} />
        </div>
      </div>

      {/* Recent */}
      <div style={{ marginTop:22, padding:'0 4px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
          <div style={{ fontSize:15, fontWeight:700, color:t.textP }}>Actividad Reciente</div>
          <div onClick={()=>go.tab('finance')} style={{ fontSize:12, color:t.brand, fontWeight:700, cursor:'pointer' }}>Ver todo</div>
        </div>
        <div style={{ marginTop:12, borderRadius:24, background:t.surface,
          border:`1px solid ${t.border}`, overflow:'hidden' }}>
          {recent.length === 0 && (
            <div style={{ padding:28, textAlign:'center', color:t.textS, fontSize:13 }}>
              Aún no hay movimientos. Registra tu primera venta o gasto.
            </div>
          )}
          {recent.map((it, i) => (
            <ActivityRow key={it.id} t={t} item={it} isLast={i === recent.length-1}/>
          ))}
        </div>
      </div>
    </div>
  );
};

const HeroStat = ({ ic, label, amount }) => (
  <div style={{ display:'flex', alignItems:'center', gap:4 }}>
    <Ic name={ic} size={14} color="rgba(255,255,255,.85)" />
    <div>
      <div style={{ fontSize:10, color:'rgba(255,255,255,.82)' }}>{label}</div>
      <div style={{ fontSize:14, fontWeight:700, color:'#fff' }}>${fmtK(amount)}</div>
    </div>
  </div>
);

const Action = ({ t, ic, label, color, onClick }) => (
  <div onClick={onClick} style={{ flex:1, display:'flex', flexDirection:'column',
    alignItems:'center', gap:6, cursor:'pointer' }}>
    <div style={{ width:52, height:52, borderRadius:18,
      background:color+'26', border:`1px solid ${color}4D`,
      display:'flex', alignItems:'center', justifyContent:'center', transition:'transform .15s' }}
      onMouseDown={e=>e.currentTarget.style.transform='scale(.94)'}
      onMouseUp={e=>e.currentTarget.style.transform=''}
      onMouseLeave={e=>e.currentTarget.style.transform=''}>
      <Ic name={ic} size={22} color={color} sw={2}/>
    </div>
    <div style={{ fontSize:11, fontWeight:600, color:t.textS, textAlign:'center' }}>{label}</div>
  </div>
);

const ActivityRow = ({ t, item, isLast }) => {
  const isIn = item.type === 'income';
  const c = isIn ? '#10B981' : '#EF4444';
  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', padding:'12px 14px', gap:12 }}>
        <div style={{ width:36, height:36, borderRadius:'50%', background:c+'1F',
          display:'flex', alignItems:'center', justifyContent:'center' }}>
          <Ic name={isIn ? 'up' : 'down'} size={16} color={c} sw={2.2}/>
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:14, fontWeight:600, color:t.textP, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.title}</div>
          <div style={{ fontSize:12, color:t.textS }}>{item.time}</div>
        </div>
        <div style={{ fontSize:14, fontWeight:700, color:c, whiteSpace:'nowrap' }}>
          {isIn ? '+' : '-'}${item.amount.toLocaleString()}
        </div>
      </div>
      {!isLast && <div style={{ height:1, background:t.border, margin:'0 14px' }}/>}
    </div>
  );
};

// ─── Screen: Finanzas ─────────────────────────────────────────────
const FinanzasScreen = ({ t, state, go }) => {
  const months = ['Marzo 2025', 'Febrero 2025', 'Enero 2025'];
  const [sel, setSel] = React.useState(0);
  const income = state.tx.filter(x => x.type==='income').reduce((s,x)=>s+x.amount, 0);
  const expenses = state.tx.filter(x => x.type==='expense').reduce((s,x)=>s+x.amount, 0);
  const balance = income - expenses;
  const progress = Math.min(1, income / state.profile.goal);

  return (
    <div className="fade-in" style={{ padding:'0 20px 16px' }}>
      <TopHeader t={t} title="Finanzas" right={null}/>

      <div style={{ display:'flex', gap:8, marginTop:16, overflowX:'auto', padding:'0 4px 4px' }}>
        {months.map((m,i)=>{
          const on = i===sel;
          return (
            <div key={i} onClick={()=>setSel(i)} style={{
              padding:'6px 16px', borderRadius:100, flexShrink:0,
              background: on ? t.brand : t.surface,
              border:`1px solid ${on ? t.brand : t.border}`,
              color: on ? '#fff' : t.textS,
              fontSize:12, fontWeight:600, cursor:'pointer',
            }}>{m}</div>
          );
        })}
      </div>

      <div style={{ margin:'20px 4px 0', padding:22, borderRadius:28,
        background:t.surface, border:`1px solid ${t.border}` }}>
        <StatRow t={t} label="Ingresos"  value={income}   color={t.success} ic="up"/>
        <Divider t={t}/>
        <StatRow t={t} label="Gastos"    value={expenses} color={t.error}   ic="down"/>
        <Divider t={t}/>
        <StatRow t={t} label="Balance"   value={balance}  color={balance>=0?t.brand:t.error} ic="wallet" bold/>
      </div>

      <div style={{ margin:'20px 4px 0', padding:22, borderRadius:28,
        background:t.surface, border:`1px solid ${t.border}` }}>
        <div style={{ display:'flex', justifyContent:'space-between' }}>
          <div style={{ fontSize:14, fontWeight:700, color:t.textP }}>Meta Mensual</div>
          <div style={{ fontSize:14, fontWeight:700, color:t.brand }}>{Math.round(progress*100)}%</div>
        </div>
        <div style={{ height:10, borderRadius:100, background:t.surface2, marginTop:12, overflow:'hidden' }}>
          <div style={{ width:`${progress*100}%`, height:'100%', background:t.brand, transition:'width .4s' }}/>
        </div>
        <div style={{ fontSize:12, color:t.textS, marginTop:8 }}>
          Objetivo: ${state.profile.goal.toLocaleString()}
        </div>
      </div>

      <div style={{ marginTop:22, padding:'0 4px' }}>
        <div style={{ fontSize:15, fontWeight:700, color:t.textP }}>Gastos Fijos</div>
        <div style={{ marginTop:12, borderRadius:24, background:t.surface,
          border:`1px solid ${t.border}`, overflow:'hidden' }}>
          {state.fixed.map((e,i)=>(
            <div key={e.id}>
              <div style={{ display:'flex', alignItems:'center', padding:'12px 14px', gap:12 }}>
                <div style={{ width:36, height:36, borderRadius:12, background:t.error+'1F',
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <Ic name="receipt" size={16} color={t.error} sw={2}/>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:14, fontWeight:600, color:t.textP }}>{e.name}</div>
                  <div style={{ fontSize:12, color:t.textS }}>{e.category}</div>
                </div>
                <div style={{ fontSize:14, fontWeight:700, color:t.error }}>-${e.amount.toLocaleString()}</div>
              </div>
              {i<state.fixed.length-1 && <div style={{ height:1, background:t.border, margin:'0 14px' }}/>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const Divider = ({ t }) => <div style={{ height:1, background:t.border, margin:'18px 0' }}/>;
const StatRow = ({ t, label, value, color, ic, bold }) => (
  <div style={{ display:'flex', alignItems:'center', gap:12 }}>
    <div style={{ width:32, height:32, borderRadius:10, background:color+'1F',
      display:'flex', alignItems:'center', justifyContent:'center' }}>
      <Ic name={ic} size={16} color={color} sw={2.2}/>
    </div>

const IaScreen = ({ t, state, go }) => {
  const [input, setInput] = React.useState('');
  const scrollRef = React.useRef(null);
  const suggestions = [
    '¿Cuál es mi margen este mes?',
    'Cómo bajar mis gastos fijos',
    '¿Cuándo llegaré a mi meta?',
    'Productos con mejor margen',
  ];

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [state.chat]);

  const send = (text) => {
    const msg = text.trim(); if (!msg) return;
    setInput('');
    go.sendChat(msg);
  };

  return (
    <div className="fade-in" style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', paddingTop:54 }}>
      {/* Header */}
      <div style={{ padding:'18px 20px 12px', display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ width:44, height:44, borderRadius:16, background:t.brandGrad,
          display:'flex', alignItems:'center', justifyContent:'center' }}>
          <Ic name="bot" size={22} color="#fff" sw={2}/>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:20, fontWeight:800, color:t.textP, letterSpacing:-.3 }}>Asistente IA</div>
          <div style={{ fontSize:12, color:t.brand, fontWeight:600 }}>Powered by Págate-IA</div>
        </div>
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'4px 20px 8px' }}>
        {state.chat.map((m,i)=>(
          <div key={i} style={{
            display:'flex', alignItems:'flex-start', gap:8, marginBottom:10,
            justifyContent: m.isAi ? 'flex-start' : 'flex-end',
          }}>
            {m.isAi && (
              <div style={{ width:28, height:28, borderRadius:'50%', background:t.brandGrad,
                display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <Ic name="bot" size={14} color="#fff" sw={2}/>
              </div>
            )}
            <div style={{
              maxWidth:'78%', padding:'10px 12px', borderRadius:18,
              background: m.isAi ? t.surface : t.brand+'26',
              border:`1px solid ${m.isAi ? t.border : t.brand+'4D'}`,
              fontSize:14, lineHeight:1.45, color:t.textP,
              whiteSpace:'pre-wrap',
            }}>{m.text}</div>
          </div>
        ))}
        {state.chatLoading && (
          <div style={{ display:'flex', gap:8, alignItems:'center', padding:'8px 4px' }}>
            <div style={{ width:28, height:28, borderRadius:'50%', background:t.brandGrad,
              display:'flex', alignItems:'center', justifyContent:'center' }}>
              <Ic name="bot" size={14} color="#fff" sw={2}/>
            </div>
            <div style={{ padding:'10px 14px', borderRadius:18, background:t.surface, border:`1px solid ${t.border}` }}>
              <TypingDots t={t}/>
            </div>
          </div>
        )}
      </div>

      {/* Suggestions */}
      {state.chat.length <= 1 && (
        <div style={{ padding:'4px 0 6px' }}>
          <div style={{ display:'flex', gap:8, overflowX:'auto', padding:'0 20px' }}>
            {suggestions.map((s,i)=>(
              <div key={i} onClick={()=>send(s)} style={{
                flexShrink:0, padding:'6px 12px', borderRadius:100,
                background:t.surface, border:`1px solid ${t.border}`,
                fontSize:12, color:t.textS, cursor:'pointer',
              }}>{s}</div>
            ))}
          </div>
        </div>
      )}

      {/* Input */}
      <div style={{ padding:'8px 20px 84px', display:'flex', gap:8, alignItems:'center' }}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter' && send(input)}
          placeholder="Escribe una pregunta..."
          style={{
            flex:1, height:48, borderRadius:24, padding:'0 16px',
            background:t.surface, border:`1px solid ${t.border}`,
            color:t.textP, outline:'none', fontSize:14,
          }}/>
        <div onClick={()=>send(input)} style={{
          width:48, height:48, borderRadius:'50%', background:t.brandGrad,
          display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer',
          boxShadow:t.shBrand,
        }}>
          <Ic name="send" size={20} color="#fff" sw={2}/>
        </div>
      </div>
    </div>
  );
};

const SettingsSheet = ({ t, state, onClose, onSave, onLogout, toggleTheme }) => {
  const [name, setName] = React.useState(state.profile.name);
  const [biz, setBiz]   = React.useState(state.profile.businessName);
  const [goal, setGoal] = React.useState(String(state.profile.goal));
  const [curr, setCurr] = React.useState(state.profile.currency);
  const save = () => {
    const g = parseFloat(goal); if (!name.trim() || isNaN(g)) return;
    const initials = name.trim().split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase();
    onSave({ name:name.trim(), businessName:biz.trim(), goal:g, currency:curr, initials });
  };
  return (
    <ModalShell t={t} onClose={onClose} title="Configuración" accent={t.brand}>
      <Field t={t} label="Nombre"><input value={name} onChange={e=>setName(e.target.value)} style={inputStyle(t)}/></Field>
      <Field t={t} label="Negocio"><input value={biz} onChange={e=>setBiz(e.target.value)} style={inputStyle(t)}/></Field>
      <div style={{ display:'flex', gap:10 }}>
        <div style={{ flex:1 }}>
          <Field t={t} label="Meta mensual"><input type="number" inputMode="decimal" value={goal} onChange={e=>setGoal(e.target.value)} style={inputStyle(t)}/></Field>
        </div>
        <div style={{ flex:1 }}>
          <Field t={t} label="Moneda">
            <div style={{ display:'flex', gap:6 }}>
              {['MXN','USD','EUR','COP'].map(c=>{
                const on = c===curr;
                return (
                  <div key={c} onClick={()=>setCurr(c)} style={{
                    flex:1, padding:'12px 0', borderRadius:14, textAlign:'center',
                    background:on?t.brand:t.surface2,
                    border:`1px solid ${on?t.brand:t.border}`,
                    color:on?'#fff':t.textS, fontSize:12, fontWeight:700, cursor:'pointer',
                  }}>{c}</div>
                );
              })}
            </div>
          </Field>
        </div>
      </div>
      <Field t={t} label="Apariencia">
        <div onClick={toggleTheme} style={{
          height:48, borderRadius:16, background:t.surface2, border:`1px solid ${t.border}`,
          display:'flex', alignItems:'center', padding:'0 14px', gap:10, cursor:'pointer',
        }}>
          <Ic name={t.dark?'moon':'sun'} size={18} color={t.textP}/>
          <div style={{ flex:1, fontSize:14, fontWeight:600, color:t.textP }}>
            Modo {t.dark ? 'oscuro' : 'claro'}
          </div>
          <div style={{ width:36, height:22, borderRadius:100, padding:2,
            background: t.dark ? t.brand : t.border, transition:'background .2s' }}>
            <div style={{ width:18, height:18, borderRadius:'50%', background:'#fff',
              transform: t.dark ? 'translateX(14px)' : 'translateX(0)',
              transition:'transform .2s', boxShadow:'0 1px 3px rgba(0,0,0,.2)' }}/>
          </div>
        </div>
      </Field>
      <button onClick={save} style={{
        width:'100%', height:52, borderRadius:100, border:'none', cursor:'pointer',
        background:t.brand, color:'#fff', fontFamily:t.font, fontSize:15, fontWeight:700,
        marginTop:4, boxShadow:t.shBrand,
      }}>Guardar cambios</button>
    </ModalShell>
  );
};

    <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
      padding:'80px 28px 28px', background:t.bg }}>
      <div style={{ width:72, height:72, borderRadius:22, background:t.brandGrad,
        boxShadow:t.shBrandX, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:20 }}>
        <Ic name="coin" size={40} color="#fff" sw={2}/>
      </div>
      <div style={{ fontSize:28, fontWeight:800, color:t.textP, letterSpacing:-.5 }}>Bienvenido</div>
      <div style={{ fontSize:14, color:t.textS, marginTop:6 }}>
        Inicia sesión para continuar con Págate-IA
      </div>
      <div style={{ marginTop:28 }}>
        <Field t={t} label="Tu nombre"><input autoFocus value={name} onChange={e=>setName(e.target.value)} style={inputStyle(t)} placeholder="Nombre y apellido"/></Field>
        <Field t={t} label="Negocio"><input value={biz} onChange={e=>setBiz(e.target.value)} style={inputStyle(t)} placeholder="Ej. Taller Mendoza"/></Field>
      </div>
      <div style={{ flex:1 }}/>
      <button disabled={!name.trim()} onClick={()=>onLogin({ name:name.trim(), biz:biz.trim() })} style={{
        width:'100%', height:54, borderRadius:100, border:'none',
        background: name.trim() ? t.brand : t.border,
        cursor: name.trim() ? 'pointer' : 'not-allowed',
        color:'#fff', fontFamily:t.font, fontSize:15, fontWeight:700,
        boxShadow: name.trim() ? t.shBrandX : 'none',
      }}>Entrar</button>
    </div>
  );
};

// ─── Add-transaction modal ───────────────────────────────────────
const AddTxModal = ({ t, type, onClose, onSave }) => {
  const [title, setTitle] = React.useState('');
  const [amount, setAmount] = React.useState('');
  const isIn = type === 'income';
  const color = isIn ? t.success : t.error;

  const submit = () => {
    const n = parseFloat(amount);
    if (!title.trim() || isNaN(n) || n <= 0) return;
    onSave({ type, title: title.trim(), amount: n });
  };

  return (
    <ModalShell t={t} onClose={onClose} title={isIn ? 'Nueva Venta' : 'Nuevo Gasto'} accent={color}>
      <Field t={t} label="Concepto">
        <input autoFocus value={title} onChange={e=>setTitle(e.target.value)}
          placeholder={isIn ? 'Servicio, producto...' : 'Proveedor, gasto...'}
          style={inputStyle(t)}/>
      </Field>
      <Field t={t} label="Monto">
        <div style={{ position:'relative' }}>
          <div style={{ position:'absolute', left:18, top:'50%', transform:'translateY(-50%)',
            fontSize:16, fontWeight:700, color:t.textS }}>$</div>
          <input type="number" inputMode="decimal" value={amount} onChange={e=>setAmount(e.target.value)}
            placeholder="0" style={{ ...inputStyle(t), paddingLeft:32, fontSize:18, fontWeight:700 }}/>
        </div>
      </Field>
      <button onClick={submit} style={{
        width:'100%', height:52, borderRadius:100, border:'none', cursor:'pointer',
        background:color, color:'#fff', fontFamily:t.font, fontSize:15, fontWeight:700,
        marginTop:4, boxShadow:`0 6px 16px ${color}40`,
      }}>{isIn ? 'Registrar venta' : 'Registrar gasto'}</button>
    </ModalShell>
  );
};

const AddItemModal = ({ t, onClose, onSave }) => {
  const [name, setName] = React.useState('');
  const [price, setPrice] = React.useState('');
  const [stock, setStock] = React.useState('');
  const [unit, setUnit] = React.useState('piezas');
  const [type, setType] = React.useState('product');

  const submit = () => {
    const p = parseFloat(price), s = parseInt(stock,10);
    if (!name.trim() || isNaN(p) || isNaN(s)) return;
    onSave({ name:name.trim(), price:p, stock:s, unit, type });
  };

  return (
    <ModalShell t={t} onClose={onClose} title="Nuevo Item" accent={t.brand}>
      <div style={{ display:'flex', gap:8, marginBottom:12 }}>
        {[{k:'product',l:'Producto'},{k:'material',l:'Material'}].map(x=>{
          const on = x.k===type;
          return (
            <div key={x.k} onClick={()=>setType(x.k)} style={{
              flex:1, padding:'8px 0', borderRadius:100, textAlign:'center',
              background:on?t.brand:t.surface2,
              border:`1px solid ${on?t.brand:t.border}`,
              color:on?'#fff':t.textS, fontSize:13, fontWeight:600, cursor:'pointer',
            }}>{x.l}</div>
          );
        })}
      </div>
      <Field t={t} label="Nombre">
        <input autoFocus value={name} onChange={e=>setName(e.target.value)} style={inputStyle(t)} placeholder="Ej. Aceite Motor 5W-30"/>
      </Field>
      <div style={{ display:'flex', gap:10 }}>
        <div style={{ flex:1 }}>
          <Field t={t} label="Precio">
            <input type="number" inputMode="decimal" value={price} onChange={e=>setPrice(e.target.value)} style={inputStyle(t)} placeholder="0.00"/>
          </Field>
        </div>
        <div style={{ flex:1 }}>
          <Field t={t} label="Stock">
            <input type="number" inputMode="numeric" value={stock} onChange={e=>setStock(e.target.value)} style={inputStyle(t)} placeholder="0"/>
          </Field>
        </div>
      </div>
      <Field t={t} label="Unidad">
        <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
          {['piezas','litros','juegos','kg','metros'].map(u=>{
            const on = u===unit;
            return (
              <div key={u} onClick={()=>setUnit(u)} style={{
                padding:'6px 14px', borderRadius:100,
                background:on?t.brand:t.surface2,
                border:`1px solid ${on?t.brand:t.border}`,
                color:on?'#fff':t.textS, fontSize:12, fontWeight:600, cursor:'pointer',
              }}>{u}</div>
            );
          })}
        </div>
      </Field>
      <button onClick={submit} style={{
        width:'100%', height:52, borderRadius:100, border:'none', cursor:'pointer',
        background:t.brand, color:'#fff', fontFamily:t.font, fontSize:15, fontWeight:700,
        marginTop:8, boxShadow:t.shBrand,
      }}>Agregar al inventario</button>
    </ModalShell>
  );
};

const ModalShell = ({ t, onClose, title, accent, children }) => (
  <div style={{
    position:'absolute', inset:0, zIndex:100,
    background:'rgba(0,0,0,.5)', backdropFilter:'blur(4px)',
    display:'flex', alignItems:'flex-end', justifyContent:'center',
    animation:'fade .2s ease',
  }} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{
      width:'100%', background:t.bg,
      borderTopLeftRadius:28, borderTopRightRadius:28,
      padding:'14px 20px 28px', animation:'slideUp .25s ease',
    }}>
      <div style={{ width:36, height:4, borderRadius:100, background:t.textT,
        opacity:.5, margin:'0 auto 12px' }}/>
      <div style={{ display:'flex', alignItems:'center', marginBottom:16 }}>
        <div style={{ width:4, height:20, background:accent, borderRadius:4, marginRight:10 }}/>
        <div style={{ fontSize:18, fontWeight:800, color:t.textP, flex:1 }}>{title}</div>
        <div onClick={onClose} style={{ width:32, height:32, borderRadius:'50%',
          background:t.surface, border:`1px solid ${t.border}`,
          display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
          <Ic name="close" size={16} color={t.textS} sw={2.2}/>
        </div>
      </div>
      {children}
      <style>{`@keyframes slideUp { from { transform:translateY(100%);} to { transform:none; } }`}</style>
    </div>
  </div>
);

const Field = ({ t, label, children }) => (
  <div style={{ marginBottom:12 }}>
    <div style={{ fontSize:12, fontWeight:600, color:t.textS, marginBottom:6, letterSpacing:.2 }}>{label}</div>
    {children}
  </div>
);

const inputStyle = (t) => ({
  width:'100%', height:48, borderRadius:16, padding:'0 16px',
  background:t.surface2, border:`1px solid ${t.border}`,
  color:t.textP, outline:'none', fontFamily:t.font, fontSize:15,
  WebkitAppearance:'none',
});

// ─── State (persisted) ───────────────────────────────────────────
const seed = {
  profile: { name:'Carlos Mendoza', businessName:'Taller Mendoza', initials:'CM', currency:'MXN', goal:35000, isPro:true },
  tx: [
    { id:1, type:'income',  title:'Servicio de frenos', amount:850,  time:'Hoy, 10:30' },
    { id:2, type:'expense', title:'Aceite motor 5W-30', amount:320,  time:'Hoy, 09:15' },
    { id:3, type:'income',  title:'Cambio de clutch',   amount:2200, time:'Ayer, 16:45' },
    { id:4, type:'income',  title:'Afinación general',  amount:1100, time:'Ayer, 14:20' },
    { id:5, type:'expense', title:'Renta local',        amount:5000, time:'13 mar' },
    { id:6, type:'income',  title:'Diagnóstico',        amount:450,  time:'12 mar' },
    { id:7, type:'income',  title:'Cambio batería',     amount:1800, time:'11 mar' },
    { id:8, type:'income',  title:'Alineación',         amount:600,  time:'10 mar' },
    { id:9, type:'income',  title:'Revisión motor',     amount:1950, time:'9 mar' },
    { id:10,type:'income',  title:'Servicio general',   amount:2150, time:'8 mar' },
    { id:11,type:'income',  title:'Cambio aceite x5',   amount:4250, time:'7 mar' },
    { id:12,type:'income',  title:'Reparación escape',  amount:1700, time:'6 mar' },
    { id:13,type:'income',  title:'Balanceo llantas',   amount:750,  time:'5 mar' },
    { id:14,type:'income',  title:'Afinación mayor',    amount:6000, time:'4 mar' },
    { id:15,type:'expense', title:'Filtros varios',     amount:2980, time:'3 mar' },
  ],
  fixed: [
    { id:'e1', name:'Renta del local',     category:'Infraestructura', amount:5000 },
    { id:'e2', name:'Electricidad',        category:'Servicios',       amount:850 },
    { id:'e3', name:'Internet y teléfono', category:'Servicios',       amount:450 },
  ],
  inventory: [
    { id:'i1', name:'Aceite Motor 5W-30', type:'material', price:89.50, stock:24, unit:'litros', status:'ok' },
    { id:'i2', name:'Filtro de Aceite',   type:'material', price:45.00, stock:3,  unit:'piezas', status:'low' },
    { id:'i3', name:'Pastillas de Freno', type:'product',  price:280.00,stock:0,  unit:'juegos', status:'critical' },
    { id:'i4', name:'Líquido de Frenos',  type:'material', price:65.00, stock:18, unit:'litros', status:'ok' },
    { id:'i5', name:'Bujías NGK Premium', type:'product',  price:95.00, stock:2,  unit:'piezas', status:'low' },
    { id:'i6', name:'Kit de Embrague',    type:'product',  price:1850,  stock:7,  unit:'juegos', status:'ok' },
  ],
  chat: [
    { isAi:true, text:'¡Hola! Soy tu asistente de Págate-IA. Puedo ayudarte a analizar tus finanzas, sugerir precios y optimizar tu inventario. ¿En qué te ayudo hoy?' },
  ],
  chatLoading: false,
};

const LS_KEY = 'pagate_ia_state_v1';
const loadState = () => {
  try { const s = JSON.parse(localStorage.getItem(LS_KEY)); return s ? {...seed, ...s, chatLoading:false} : seed; }
  catch(e){ return seed; }
};

const statusFor = (stock) => stock===0 ? 'critical' : stock<=5 ? 'low' : 'ok';

// ─── App root ────────────────────────────────────────────────────
function App() {
  const [dark, setDark] = React.useState(() => {
    const v = localStorage.getItem('pagate_dark'); return v === null ? true : v === '1';
  });
  const t = makeTheme(dark);
  const [tab, setTab] = React.useState('home');
  const [state, setState] = React.useState(loadState);
  const [modal, setModal] = React.useState(null);
  const [sheet, setSheet] = React.useState(null);
  const [loggedIn, setLoggedIn] = React.useState(() => localStorage.getItem('pagate_logged') !== '0');
  const [toast, setToast] = React.useState(null);

  // Persistence
  React.useEffect(() => {
    localStorage.setItem(LS_KEY, JSON.stringify({ ...state, chatLoading:false }));
  }, [state]);
  React.useEffect(() => { localStorage.setItem('pagate_dark', dark ? '1' : '0'); }, [dark]);

  const go = {
    tab: setTab,
    toggleTheme: () => setDark(d => !d),
    openAdd: (type) => setModal({ kind:'tx', type }),
    openAddItem: () => setModal({ kind:'item' }),
    openSheet: (kind) => setSheet(kind),
    showToast: (msg) => { setToast(msg); setTimeout(()=>setToast(null), 2200); },
    sendChat: async (text) => {
      setState(s => ({ ...s, chat:[...s.chat, { isAi:false, text }], chatLoading:true }));
      // Local mocked response (fast, no external call)
      setTimeout(() => {
        const income = state.tx.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
        const exp = state.tx.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
        const bal = income - exp;
        const margin = income>0 ? ((bal/income)*100).toFixed(1) : 0;
        let ans = '';
        const q = text.toLowerCase();
        if (q.includes('margen')) {
          ans = `Tu margen este mes es de ${margin}%.\n\nIngresos: $${income.toLocaleString()}\nGastos: $${exp.toLocaleString()}\nBalance: $${bal.toLocaleString()}`;
        } else if (q.includes('meta')) {
          const falta = Math.max(0, state.profile.goal - income);
          ans = falta === 0
            ? '¡Felicidades! Ya alcanzaste tu meta mensual de $' + state.profile.goal.toLocaleString() + '.'
            : `Te faltan $${falta.toLocaleString()} para llegar a tu meta de $${state.profile.goal.toLocaleString()}.\n\nCon tu ritmo actual, podrías alcanzarla en los próximos días manteniendo un promedio de ventas similar.`;
        } else if (q.includes('gasto') || q.includes('bajar')) {
          ans = `Detecté $${state.fixed.reduce((s,x)=>s+x.amount,0).toLocaleString()} en gastos fijos. Tu gasto más alto es "Renta del local" ($5,000). Te sugiero:\n\n1. Renegociar el contrato de renta\n2. Revisar tu consumo eléctrico\n3. Consolidar servicios de internet/teléfono`;
        } else if (q.includes('margen') || q.includes('producto') || q.includes('mejor')) {
          ans = 'Tus productos con mejor margen son:\n\n• Kit de Embrague ($1,850)\n• Pastillas de Freno ($280)\n• Bujías NGK Premium ($95)\n\nEnfócate en promover estos para aumentar rentabilidad.';
        } else {
          ans = `Analicé tus datos: balance de $${bal.toLocaleString()} con margen de ${margin}%. ¿Quieres que profundice en margen, meta o gastos fijos?`;
        }
        setState(s => ({ ...s, chat:[...s.chat, { isAi:true, text:ans }], chatLoading:false }));
      }, 900);
    },
  };

  const saveTx = ({ type, title, amount }) => {
    setState(s => ({ ...s, tx:[...s.tx, { id:Date.now(), type, title, amount, time:'Ahora' }] }));
    setModal(null);
  };
  const saveItem = (it) => {
    setState(s => ({ ...s, inventory:[...s.inventory, { ...it, id:'i'+Date.now(), status:statusFor(it.stock) }] }));
    setModal(null);
  };

  // Responsive device size — phone full-screen on mobile, framed on desktop
  const [viewport, setViewport] = React.useState({ w:window.innerWidth, h:window.innerHeight });
  React.useEffect(() => {
    const onR = () => setViewport({ w:window.innerWidth, h:window.innerHeight });
    window.addEventListener('resize', onR); return () => window.removeEventListener('resize', onR);
  }, []);
  const isMobile = viewport.w < 640;
  const deviceW = isMobile ? viewport.w : 402;
  const deviceH = isMobile ? viewport.h : 874;

  return (
    <div style={{
      minHeight:'100vh', width:'100%', background: isMobile ? t.bg : '#E8EAED',
      display:'flex', alignItems:'center', justifyContent:'center',
      padding: isMobile ? 0 : 24,
    }}>
      <div style={{
        width:deviceW, height:deviceH, position:'relative',
        background:t.bg, overflow:'hidden', color:t.textP,
        fontFamily:t.font,
        borderRadius: isMobile ? 0 : 48,
        boxShadow: isMobile ? 'none' : '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      }}>
        {/* Dynamic island (desktop framed view only) */}
        {!isMobile && (
          <div style={{ position:'absolute', top:11, left:'50%', transform:'translateX(-50%)',
            width:126, height:37, borderRadius:24, background:'#000', zIndex:50 }}/>
        )}
        {!isMobile && <StatusBar t={t}/>}

        {/* Content */}
        <div style={{ position:'absolute', inset:0,
          top: isMobile ? 0 : 54, bottom: 76,
          overflow:'hidden' }}>
          <div style={{ height:'100%', overflowY:'auto',
            paddingTop: isMobile ? 'env(safe-area-inset-top, 0px)' : 0 }}>
            {tab === 'home'    && <HomeScreen      t={t} state={state} go={go}/>}
            {tab === 'finance' && <FinanzasScreen  t={t} state={state} go={go}/>}
            {tab === 'inv'     && <InventarioScreen t={t} state={state} go={go}/>}
            {tab === 'ia'      && <IaScreen        t={t} state={state} go={go}/>}
            {tab === 'profile' && <PerfilScreen    t={t} state={state} go={go}/>}
          </div>
        </div>

        <BottomNav t={t} active={tab} setActive={setTab}/>

        {/* Home indicator (desktop frame only) */}
        {!isMobile && (
          <div style={{ position:'absolute', bottom:0, left:0, right:0, zIndex:60,
            height:20, display:'flex', justifyContent:'center', alignItems:'flex-end',
            paddingBottom:6, pointerEvents:'none' }}>
            <div style={{ width:139, height:5, borderRadius:100,
              background: t.dark ? 'rgba(255,255,255,.7)' : 'rgba(0,0,0,.25)' }}/>
          </div>
        )}

        {/* Modal */}
        {modal?.kind === 'tx' && (
          <AddTxModal t={t} type={modal.type} onClose={()=>setModal(null)} onSave={saveTx}/>
        )}
        {modal?.kind === 'item' && (
          <AddItemModal t={t} onClose={()=>setModal(null)} onSave={saveItem}/>
        )}
        {sheet === 'settings' && (
          <SettingsSheet t={t} state={state}
            toggleTheme={()=>setDark(d=>!d)}
            onClose={()=>setSheet(null)}
            onSave={(patch)=>{
              setState(s => ({ ...s, profile:{...s.profile, ...patch} }));
              setSheet(null);
              setToast('Configuración guardada'); setTimeout(()=>setToast(null), 2000);
            }}/>
        )}
        {sheet === 'help'   && <HelpSheet   t={t} onClose={()=>setSheet(null)}/>}
        {sheet === 'rate'   && <RateSheet   t={t} onClose={()=>setSheet(null)}/>}
        {sheet === 'share'  && <ShareSheet  t={t} onClose={()=>setSheet(null)}/>}
        {sheet === 'notifications' && <NotificationsSheet t={t} onClose={()=>setSheet(null)}/>}
        {sheet === 'logout' && (
          <LogoutSheet t={t} onClose={()=>setSheet(null)}
            onConfirm={()=>{
              localStorage.setItem('pagate_logged','0');
              setLoggedIn(false); setSheet(null); setTab('home');
            }}/>
        )}
        {sheet === 'editProfile' && (
          <SettingsSheet t={t} state={state}
            toggleTheme={()=>setDark(d=>!d)}
            onClose={()=>setSheet(null)}
            onSave={(patch)=>{
              setState(s => ({ ...s, profile:{...s.profile, ...patch} }));
              setSheet(null);
            }}/>
        )}

        {/* Toast */}
        {toast && (
          <div style={{ position:'absolute', left:'50%', bottom:96, transform:'translateX(-50%)',
            zIndex:110, padding:'10px 18px', borderRadius:100,
            background:t.textP, color:t.bg, fontSize:13, fontWeight:600,
            boxShadow:'0 6px 20px rgba(0,0,0,.2)', whiteSpace:'nowrap',
          }}>{toast}</div>
        )}

        {/* Login overlay */}
        {!loggedIn && (
          <LoginScreen t={t} toggleTheme={()=>setDark(d=>!d)}
            onLogin={({ name, biz })=>{
              const initials = name.split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase();
              setState(s => ({ ...s, profile:{...s.profile, name, businessName: biz || s.profile.businessName, initials } }));
              localStorage.setItem('pagate_logged','1');
              setLoggedIn(true);
            }}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
